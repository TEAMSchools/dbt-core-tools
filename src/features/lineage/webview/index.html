<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} https://cdn.jsdelivr.net; img-src {{cspSource}};"
    />
    <link rel="stylesheet" href="{{styleUri}}" />
    <title>dbt Lineage</title>
  </head>
  <body>
    <div id="toolbar">
      <label id="lock-label">
        <input type="checkbox" id="lock-toggle" />
        Lock view
      </label>
      <span id="center-label"></span>
    </div>
    <svg id="graph"></svg>
    <div id="context-menu" class="context-menu hidden">
      <ul>
        <li data-action="openFile">Open File</li>
        <li data-action="toggleProperties">Toggle SQL/Properties</li>
        <li class="separator"></li>
        <li data-action="runModel">Run Model</li>
        <li data-action="buildModel">Build Model</li>
        <li data-action="testModel">Test Model</li>
        <li data-action="showModel">Show Model</li>
      </ul>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@1/dist/dagre.min.js"></script>
    <script src="{{scriptUri}}"></script>
  </body>
</html>
